version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    networks:
      - app-network

  frontend:
    build: ./frontend
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "9010:80"  # <--- Change: Maps Server Port 9010 to Nginx Port 80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge